name: Promote Launcher Build

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Build number to promote (for example 1052). Leave blank to use the latest successful build.
        required: false
        type: string
      run_id:
        description: Optional GitHub Actions run id from the Gradle workflow. Overrides build_number.
        required: false
        type: string

concurrency:
  group: promote-launcher
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GRADLE_WORKFLOW_FILE: gradle.yml
      REMOTE_HOST: ${{ secrets.LAUNCHER_REMOTE_HOST }}
      REMOTE_USER: ${{ secrets.LAUNCHER_REMOTE_USER }}
      REMOTE_BASE_DIR: ${{ secrets.LAUNCHER_REMOTE_BASE_DIR }}
      DISCORD_WEBHOOK_ID: ${{ secrets.DISCORD_WEBHOOK_ID }}
      LAUNCHER_UPDATE_BASE_URL: ${{ secrets.LAUNCHER_UPDATE_BASE_URL }}
      LAUNCHER_VERSION_UPDATE_BASE_URL: ${{ secrets.LAUNCHER_VERSION_UPDATE_BASE_URL }}

    steps:
      - name: Checkout master
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve Build Run
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BUILD_NUMBER: ${{ inputs.build_number }}
          INPUT_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          auth_header="Authorization: Bearer ${GH_TOKEN}"
          api_header="Accept: application/vnd.github+json"

          if [[ -n "${INPUT_RUN_ID}" ]]; then
            run_id="${INPUT_RUN_ID}"
          elif [[ -n "${INPUT_BUILD_NUMBER}" ]]; then
            artifact_name="launcher-${INPUT_BUILD_NUMBER}"
            run_id=""

            for page in $(seq 1 20); do
              artifacts_json="$(curl -fsSL \
                -H "${auth_header}" \
                -H "${api_header}" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100&page=${page}")"

              run_id="$(jq -r \
                --arg artifact_name "${artifact_name}" \
                '.artifacts[]
                | select(.expired == false)
                | select(.name == $artifact_name)
                | .workflow_run.id' <<<"${artifacts_json}" | head -n1)"

              if [[ -n "${run_id}" && "${run_id}" != "null" ]]; then
                break
              fi

              artifact_count="$(jq -r '.artifacts | length' <<<"${artifacts_json}")"
              if [[ "${artifact_count}" -lt 100 ]]; then
                break
              fi
            done

            if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
              echo "::error::No non-expired artifact named ${artifact_name} was found."
              exit 1
            fi
          else
            runs_json="$(curl -fsSL \
              -H "${auth_header}" \
              -H "${api_header}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/${GRADLE_WORKFLOW_FILE}/runs?branch=master&event=push&per_page=20")"

            run_id="$(jq -r '[.workflow_runs[] | select(.conclusion == "success")] | .[0].id' <<<"${runs_json}")"

            if [[ -z "${run_id}" || "${run_id}" == "null" ]]; then
              echo "::error::No successful runs were found for ${GRADLE_WORKFLOW_FILE} on master."
              exit 1
            fi
          fi

          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "Selected run id: ${run_id}"

      - name: Resolve Commit SHA
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          set -euo pipefail
          commit_sha="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}" --jq '.head_sha')"
          if [[ -z "${commit_sha}" || "${commit_sha}" == "null" ]]; then
            echo "::error::Failed to resolve commit SHA for run ${RUN_ID}."
            exit 1
          fi
          echo "commit_sha=${commit_sha}" >> "${GITHUB_OUTPUT}"

      - name: Download Build Artifacts
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
        run: |
          set -euo pipefail

          auth_header="Authorization: Bearer ${GH_TOKEN}"
          api_header="Accept: application/vnd.github+json"

          artifacts_json="$(curl -fsSL \
            -H "${auth_header}" \
            -H "${api_header}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts?per_page=100")"

          artifact_id="$(jq -r '.artifacts[] | select(.name | startswith("launcher-")) | .id' <<<"${artifacts_json}" | head -n1)"
          artifact_name="$(jq -r '.artifacts[] | select(.name | startswith("launcher-")) | .name' <<<"${artifacts_json}" | head -n1)"

          if [[ -z "${artifact_id}" || "${artifact_id}" == "null" ]]; then
            echo "::error::No launcher artifact was found on run ${RUN_ID}."
            exit 1
          fi

          curl -fsSL \
            -H "${auth_header}" \
            -H "${api_header}" \
            -L "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
            -o launcher-artifacts.zip

          rm -rf launcher-artifacts
          mkdir -p launcher-artifacts
          unzip -q launcher-artifacts.zip -d launcher-artifacts

          jar_path="$(find launcher-artifacts -type f -name 'launcher-4.0-*.jar' | head -n1)"
          exe_path="$(find launcher-artifacts -type f -name 'launcher-4.0-*.exe' | head -n1)"
          osx_path="$(find launcher-artifacts -type f -name 'launcher-4.0-*-osx.app.zip' | head -n1)"

          if [[ -z "${jar_path}" || -z "${exe_path}" || -z "${osx_path}" ]]; then
            echo "::error::Expected jar/exe/osx artifacts were not found in downloaded artifact ${artifact_name}."
            exit 1
          fi

          build_number="$(basename "${jar_path}" | sed -E 's/^launcher-4\.0-([0-9]+)\.jar$/\1/')"
          if [[ -z "${build_number}" || ! "${build_number}" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to parse build number from $(basename "${jar_path}")."
            exit 1
          fi

          echo "jar_path=${jar_path}" >> "${GITHUB_OUTPUT}"
          echo "exe_path=${exe_path}" >> "${GITHUB_OUTPUT}"
          echo "osx_path=${osx_path}" >> "${GITHUB_OUTPUT}"
          echo "build_number=${build_number}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Validate Secrets
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          PLATFORM_API_KEY: ${{ secrets.PLATFORM_API_KEY }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          for var_name in \
            DEPLOY_SSH_PRIVATE_KEY \
            PLATFORM_API_KEY \
            DISCORD_WEBHOOK_TOKEN \
            REMOTE_HOST \
            REMOTE_USER \
            REMOTE_BASE_DIR \
            DISCORD_WEBHOOK_ID \
            LAUNCHER_UPDATE_BASE_URL \
            LAUNCHER_VERSION_UPDATE_BASE_URL; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::Missing required secret: ${var_name}"
              missing=1
            fi
          done
          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${REMOTE_HOST}" >> ~/.ssh/known_hosts

      - name: Upload Promoted Artifacts
        env:
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          JAR_PATH: ${{ steps.artifact.outputs.jar_path }}
          EXE_PATH: ${{ steps.artifact.outputs.exe_path }}
          OSX_PATH: ${{ steps.artifact.outputs.osx_path }}
        run: |
          set -euo pipefail

          remote_dir="${REMOTE_BASE_DIR}/${BUILD_NUMBER}"

          ssh "${REMOTE_USER}@${REMOTE_HOST}" "mkdir -p '${remote_dir}'"

          scp "${EXE_PATH}" "${REMOTE_USER}@${REMOTE_HOST}:${remote_dir}/TechnicLauncher.exe"
          scp "${JAR_PATH}" "${REMOTE_USER}@${REMOTE_HOST}:${remote_dir}/TechnicLauncher.jar"
          scp "${OSX_PATH}" "${REMOTE_USER}@${REMOTE_HOST}:${remote_dir}/TechnicLauncher.app.zip"

          ssh "${REMOTE_USER}@${REMOTE_HOST}" "cd '${REMOTE_BASE_DIR}' && ln -sfn '${BUILD_NUMBER}' 'stable'"

      - name: Refresh Launcher APIs
        env:
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          PLATFORM_API_KEY: ${{ secrets.PLATFORM_API_KEY }}
        run: |
          set -euo pipefail
          launcher_update_base="${LAUNCHER_UPDATE_BASE_URL%/}"
          launcher_version_base="${LAUNCHER_VERSION_UPDATE_BASE_URL%/}"
          curl -s -S "${launcher_update_base}/stable4/${BUILD_NUMBER}?k=${PLATFORM_API_KEY}"
          curl -s -S "${launcher_version_base}/stable4/update?k=${PLATFORM_API_KEY}"

      - name: Notify Discord
        env:
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          DISCORD_WEBHOOK_TOKEN: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          curl -s -S \
            "https://discord.com/api/webhooks/${DISCORD_WEBHOOK_ID}/${DISCORD_WEBHOOK_TOKEN}?wait=true" \
            --data-urlencode "content=New launcher stable build: ${BUILD_NUMBER}"

      - name: Promotion Summary
        env:
          RUN_ID: ${{ steps.resolve.outputs.run_id }}
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.artifact_name }}
        run: |
          {
            echo "## Promotion Complete"
            echo ""
            echo "- Build number: \`${BUILD_NUMBER}\`"
            echo "- Source run id: \`${RUN_ID}\`"
            echo "- Source artifact: \`${ARTIFACT_NAME}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Extract Release Notes
        id: notes
        run: |
          set -euo pipefail
          notes_file="$(mktemp)"

          section="$(python3 <<'PY'
          import re, sys
          with open('CHANGELOG.md') as f:
              content = f.read()
          m = re.search(
              r'^## \[Unreleased\][^\n]*\n(.*?)(?=^## \[|^<!-- historical-releases-footer -->|\Z)',
              content, re.MULTILINE | re.DOTALL,
          )
          if m:
              sys.stdout.write(m.group(1).strip())
          PY
          )"

          if [[ -n "${section}" ]] && grep -qE '^- ' <<<"${section}"; then
            printf '%s\n' "${section}" > "${notes_file}"
            echo "notes_source=changelog" >> "${GITHUB_OUTPUT}"
            echo "::notice::Using release notes from CHANGELOG.md [Unreleased]"
          else
            echo "notes_source=fallback" >> "${GITHUB_OUTPUT}"
            echo "::notice::CHANGELOG.md [Unreleased] is empty or absent — falling back to commit compare"
          fi
          echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
          JAR_PATH: ${{ steps.artifact.outputs.jar_path }}
          EXE_PATH: ${{ steps.artifact.outputs.exe_path }}
          OSX_PATH: ${{ steps.artifact.outputs.osx_path }}
          NOTES_SOURCE: ${{ steps.notes.outputs.notes_source }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        run: |
          set -euo pipefail

          tag="v4.0-${BUILD_NUMBER}-stable"
          title="4.0-${BUILD_NUMBER} (stable)"

          if [[ "${NOTES_SOURCE}" == "changelog" ]]; then
            echo "Using release notes from CHANGELOG.md [Unreleased]"
            notes_file="${NOTES_FILE}"
          else
            echo "Generating release notes from commit compare"

            prev_filter='[.[] | select(.isDraft | not) | select(.isPrerelease | not) | select(.tagName != $tag)] | .[0].tagName'

            releases_json="$(gh release list --repo "${GITHUB_REPOSITORY}" -L 100 --json tagName,isPrerelease,isDraft || echo '[]')"

            prev_tag="$(jq -r --arg tag "${tag}" "${prev_filter}" <<<"${releases_json}")"
            echo "Previous tag: ${prev_tag:-<empty>}"

            notes_file="$(mktemp)"
            trap 'rm -f "${notes_file}"' EXIT
            if [[ -n "${prev_tag}" && "${prev_tag}" != "null" ]]; then
              echo "Generating changelog: ${prev_tag}...${COMMIT_SHA}"
              if changelog="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${prev_tag}...${COMMIT_SHA}" \
                --jq '.commits | map("- " + (.commit.message | split("\n") | .[0]) + " (" + (.sha[:7]) + ")") | join("\n")')"; then
                if [[ -n "${changelog}" ]]; then
                  printf '## Changes since %s\n\n%s\n' "${prev_tag}" "${changelog}" > "${notes_file}"
                else
                  echo "::warning::Compare returned no commits for ${prev_tag}...${COMMIT_SHA}"
                  printf 'Promoted build %s to **stable** channel.\n' "${BUILD_NUMBER}" > "${notes_file}"
                fi
              else
                echo "::warning::Compare API failed for ${prev_tag}...${COMMIT_SHA}"
                printf 'Promoted build %s to **stable** channel.\n' "${BUILD_NUMBER}" > "${notes_file}"
              fi
            else
              echo "::warning::No previous release found, skipping changelog"
              printf 'Promoted build %s to **stable** channel.\n' "${BUILD_NUMBER}" > "${notes_file}"
            fi
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" &>/dev/null; then
            gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --yes
          fi

          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${COMMIT_SHA}" \
            --title "${title}" \
            --notes-file "${notes_file}" \
            "${JAR_PATH}" "${EXE_PATH}" "${OSX_PATH}"

      - name: Roll Over CHANGELOG
        if: steps.notes.outputs.notes_source == 'changelog'
        env:
          BUILD_NUMBER: ${{ steps.artifact.outputs.build_number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          export DATE_STR="$(date -u +'%Y-%m-%d')"

          python3 <<'PY'
          import os, re, sys
          build = os.environ['BUILD_NUMBER']
          date = os.environ['DATE_STR']
          new_heading = f'## [v4.0-{build}-stable] - {date}'
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = re.compile(r'^(## \[Unreleased\][^\n]*\n)', re.MULTILINE)
          if not pattern.search(content):
              sys.exit('[Unreleased] heading not found in CHANGELOG.md')
          new_content = pattern.sub(lambda m: m.group(1) + '\n' + new_heading + '\n', content, count=1)
          with open('CHANGELOG.md', 'w') as f:
              f.write(new_content)
          PY

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs(changelog): release v4.0-${BUILD_NUMBER}-stable [skip ci]"
          git push origin HEAD:master
