name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '.gitignore'
      - 'CHANGELOG.md'
      - 'COPYING.txt'
      - 'HISTORY.md'
      - 'LICENSE*'
      - 'README.md'
      - 'renovate.json5'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Calculate build number
        run: echo "BUILD_NUMBER=$(($RUN_ID + 1050))" >> "$GITHUB_ENV"
        env:
          RUN_ID: ${{ github.run_number }}

      - name: Set up JDK 25 (LTS)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew clean test spotlessCheck package --no-daemon

      - name: Add promotion shortcuts
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          promote_url="https://github.com/${REPOSITORY}/actions/workflows/promote.yml"

          {
            echo "## Promotion Shortcuts"
            echo ""
            echo "CLI command for this exact build:"
            echo ""
            echo "\`gh workflow run promote.yml -f run_id=${RUN_ID}\`"
            echo ""
            echo "Web UI:"
            echo "${promote_url}"
            echo ""
            echo "Use \`run_id=${RUN_ID}\` in the **Run workflow** form."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Archive artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: launcher-${{ env.BUILD_NUMBER }}
          path: |
            build/libs/launcher-*.jar
            build/libs/launcher-*.exe
            build/distributions/launcher-*-osx.app.zip
          if-no-files-found: error
          compression-level: 0

      - name: Update dependency graph
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: true
