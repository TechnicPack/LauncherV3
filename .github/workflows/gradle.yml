name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - '.gitignore'
      - 'COPYING.txt'
      - 'LICENSE*'
      - 'README.md'
      - 'renovate.json5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Calculate build number
        run: echo "BUILD_NUMBER=$(($RUN_ID + 1050))" >> "$GITHUB_ENV"
        env:
          RUN_ID: ${{ github.run_number }}

      - name: Set up JDK 25 (LTS)
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: ./gradlew clean test package --no-daemon

      - name: Add promotion shortcuts
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          promote_url="https://github.com/${REPOSITORY}/actions/workflows/promote.yml"

          {
            echo "## Promotion Shortcuts"
            echo ""
            echo "CLI commands for this exact build:"
            echo ""
            echo "\`gh workflow run promote.yml -f channel=beta -f run_id=${RUN_ID}\`"
            echo "\`gh workflow run promote.yml -f channel=stable -f run_id=${RUN_ID}\`"
            echo ""
            echo "Web UI:"
            echo "${promote_url}"
            echo ""
            echo "Use \`run_id=${RUN_ID}\` in the **Run workflow** form."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Archive artifacts
        uses: actions/upload-artifact@v6
        with:
          name: launcher-${{ env.BUILD_NUMBER }}
          path: |
            build/libs/launcher-*.jar
            build/libs/launcher-*.exe
            build/distributions/launcher-*-osx.app.zip
          if-no-files-found: error
          compression-level: 0

      - name: Update dependency graph
        uses: gradle/actions/dependency-submission@v4
